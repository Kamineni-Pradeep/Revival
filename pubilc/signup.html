<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="sign.css">
  <title>Revival - Sign Up</title>
</head>
<body>
  <div class="signup-container">
    <h1 class="signup-title">Join Revival</h1>
    <form class="signup-form" action="/signup" method="post">
      <input type="text" placeholder="Username" class="signup-input" name="name">
      <input type="text" placeholder="Email" class="signup-input" name="email">
      <input type="text" placeholder="Age" class="signup-input" name="uage">
      <input type="text" placeholder="Phonenumber" class="signup-input" name="phone">
      <input type="password" placeholder="Password" class="signup-input" name="upass">
      <input type="password" placeholder="Confirm Password" name="repass" class="signup-input">
      <input type="submit" value="Sign Up" class="signup-button">
    </form>
    <p class="login-link">Already have an account? <a href="login.html">Log in</a></p>
  </div>
</body>
</html>
