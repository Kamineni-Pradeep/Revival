<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="log.css">
  <title>TechVerse - Login</title>
</head>
<body>
  <div class="login-container">
    <h1 class="login-title">Welcome to Revival</h1>
    <form class="login-form" action="/login" method="post">
      <input type="text" placeholder="Username" class="login-input" name="name">
      <input type="password" placeholder="Password" class="login-input" name="password">
      <input type="submit" value="Login" class="login-button">
    </form>
    <p class="signup-link">Don't have an account? <a href="signup.html">Sign up</a></p>
  </div>
</body>
</html>
